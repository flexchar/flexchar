    <text x="27" y="122" fill="#9FB0C7" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="500" letter-spacing="0">AI engineering / product systems / useful tools</text>
    <g transform="translate(25 151)">
