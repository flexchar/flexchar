<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">flexchar profile banner</title>
  <desc id="desc">A technical profile banner with layered grids, colorful code panels, and the text flexchar.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111F"/>
      <stop offset="0.45" stop-color="#10261F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="165" y1="82" x2="1034" y2="299" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.48" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.77 0 0 0 0 0.39 0 0 0 0.75 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="686" y="67" width="374" height="226" rx="22"/>
    </clipPath>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)"/>
  <path d="M85 276C219 160 358 122 502 162C659 205 732 87 887 91C1007 94 1075 160 1132 241" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M42 318C214 196 346 239 490 246C658 253 706 156 871 163C1001 168 1074 237 1156 286" stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.22"/>

  <circle cx="1000" cy="83" r="142" fill="#22C55E" opacity="0.12" filter="url(#glow)"/>
  <circle cx="230" cy="282" r="162" fill="#38BDF8" opacity="0.12" filter="url(#glow)"/>
  <circle cx="785" cy="310" r="118" fill="#F97316" opacity="0.1" filter="url(#glow)"/>

