      <text x="18" y="20" fill="#BFF7D2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700">shipping</text>
      <rect x="130" y="0" width="116" height="29" rx="14.5" fill="#38BDF8" fill-opacity="0.14" stroke="#38BDF8" stroke-opacity="0.45"/>
      <text x="151" y="20" fill="#C7EDFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700">debugging</text>
      <rect x="260" y="0" width="128" height="29" rx="14.5" fill="#F97316" fill-opacity="0.14" stroke="#F97316" stroke-opacity="0.45"/>
